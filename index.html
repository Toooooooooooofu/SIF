<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SIF Style Rhythm Game</title>
    <style>
        body { background: #222; color: white; text-align: center; font-family: sans-serif; overflow: hidden; }
        #game-container { position: relative; width: 600px; height: 400px; margin: 50px auto; border: 2px solid #555; background: #000; }
        .target { 
            position: absolute; width: 60px; height: 60px; 
            border: 3px solid #ff69b4; border-radius: 50%; 
            transform: translate(-50%, -50%); 
        }
        .note { 
            position: absolute; width: 40px; height: 40px; 
            background: radial-gradient(circle, #fff, #ff69b4); 
            border-radius: 50%; transform: translate(-50%, -50%); 
        }
        #score { font-size: 24px; margin-top: 10px; }
        .combo-text { position: absolute; top: 40%; left: 50%; transform: translateX(-50%); font-size: 30px; color: #f0f; }
    </style>
</head>
<body>
    <h1>SIF Style Rhythm Game</h1>
    <div id="score">Score: 0</div>
    <div id="game-container">
        <div class="combo-text" id="combo"></div>
    </div>
    <p>キーボードの <b>A, S, D, F, Space, J, K, L, ;</b> で操作</p>

<script>
const container = document.getElementById('game-container');
const scoreEl = document.getElementById('score');
const comboEl = document.getElementById('combo');
let score = 0;
let combo = 0;

// スクフェス風の9つのボタン位置（半円状）
const keys = ['A', 'S', 'D', 'F', ' ', 'J', 'K', 'L', ';'];
const centerX = 300, centerY = 50; // ノーツの出現点（中央上部）
const radius = 280; // 半円の半径
const targets = [];

// ターゲットの生成
keys.forEach((key, i) => {
    const angle = Math.PI * (1.1 - (i * 0.15)); // 角度計算
    const tx = centerX + Math.cos(angle) * radius;
    const ty = centerY + Math.sin(angle) * radius;
    
    const div = document.createElement('div');
    div.className = 'target';
    div.style.left = tx + 'px';
    div.style.top = ty + 'px';
    div.innerText = key === ' ' ? 'SPC' : key;
    div.style.fontSize = '12px';
    div.style.lineHeight = '60px';
    container.appendChild(div);
    targets.push({ x: tx, y: ty, key: key.toUpperCase() });
});

let notes = [];
function spawnNote() {
    const targetIdx = Math.floor(Math.random() * 9);
    const target = targets[targetIdx];
    const noteDiv = document.createElement('div');
    noteDiv.className = 'note';
    container.appendChild(noteDiv);
    
    notes.push({
        el: noteDiv,
        targetIdx: targetIdx,
        progress: 0,
        speed: 0.01 + (Math.random() * 0.005)
    });
}

function update() {
    notes.forEach((note, index) => {
        note.progress += note.speed;
        const target = targets[note.targetIdx];
        
        // 中央からターゲットへ直線移動
        const curX = centerX + (target.x - centerX) * note.progress;
        const curY = centerY + (target.y - centerY) * note.progress;
        
        note.el.style.left = curX + 'px';
        note.el.style.top = curY + 'px';
        // サイズも徐々に大きくする
        note.el.style.width = (20 + 40 * note.progress) + 'px';
        note.el.style.height = (20 + 40 * note.progress) + 'px';

        if (note.progress >= 1.1) { // 画面外
            note.el.remove();
            notes.splice(index, 1);
            combo = 0;
            comboEl.innerText = "";
        }
    });
    requestAnimationFrame(update);
}

// キー入力判定
window.addEventListener('keydown', (e) => {
    const pressedKey = e.key.toUpperCase() === ' ' ? ' ' : e.key.toUpperCase();
    notes.forEach((note, index) => {
        const target = targets[note.targetIdx];
        if (target.key === pressedKey) {
            // 判定幅（progressが0.9〜1.1の間ならヒット）
            if (note.progress > 0.85 && note.progress < 1.1) {
                score += 100;
                combo++;
                scoreEl.innerText = `Score: ${score}`;
                comboEl.innerText = `${combo} COMBO`;
                note.el.remove();
                notes.splice(index, 1);
            }
        }
    });
});

setInterval(spawnNote, 800);
update();
</script>
</body>
</html>
