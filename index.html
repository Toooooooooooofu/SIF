<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>LoveLive Style Rhythm</title>

<style>
body{
    background:#000;
    color:white;
    text-align:center;
    font-family:sans-serif;
}

#game{
    position:relative;
    width:900px;
    height:520px;
    margin:auto;
    background:radial-gradient(circle at center -200px,#222,#000);
    overflow:hidden;
    border:4px solid white;
}

.note{
    position:absolute;
    width:28px;
    height:28px;
    background:#ffe066;
    border-radius:50%;
    box-shadow:0 0 12px #fff;
}

.target{
    position:absolute;
    width:80px;
    height:80px;
    border-radius:50%;
    border:5px solid #4de1ff;
}

#score{
    font-size:26px;
    margin:10px;
}
</style>
</head>

<body>

<h1>🎵 LoveLive Radial Rhythm 🎵</h1>
<p>キー：A S D F G H J K L</p>
<div id="score">Score:0</div>

<div id="game"></div>

<script>
const game = document.getElementById("game")
const scoreText = document.getElementById("score")

// ⭐ 横長用の中心
const centerX = 450
const centerY = 60   // 上中央（音符位置）

const radius = 380
const lanes = 9

let notes=[]
let score=0

let laneAngles=[]

// ⭐ 下半円になるように調整
for(let i=0;i<lanes;i++){

    const angle = (200 + i*17) * Math.PI/180
    laneAngles.push(angle)

    const x = centerX + Math.cos(angle)*radius
    const y = centerY + Math.sin(angle)*radius

    const t = document.createElement("div")
    t.className="target"
    t.style.left = (x-40)+"px"
    t.style.top  = (y-40)+"px"

    game.appendChild(t)
}

function spawnNote(){
    const lane = Math.floor(Math.random()*lanes)

    const note = document.createElement("div")
    note.className="note"

    note.dataset.lane = lane
    note.dataset.r = 0

    game.appendChild(note)
    notes.push(note)
}

function update(){

    notes.forEach((note,index)=>{

        let r = parseFloat(note.dataset.r)
        r += 5
        note.dataset.r = r

        const angle = laneAngles[note.dataset.lane]

        const x = centerX + Math.cos(angle)*r
        const y = centerY + Math.sin(angle)*r

        note.style.left = (x-14)+"px"
        note.style.top  = (y-14)+"px"

        if(r > radius+60){
            note.remove()
            notes.splice(index,1)
        }
    })
}

const keys = ["a","s","d","f","g","h","j","k","l"]

document.addEventListener("keydown",(e)=>{

    const lane = keys.indexOf(e.key)
    if(lane===-1) return

    notes.forEach((note,index)=>{

        if(parseInt(note.dataset.lane)!==lane) return

        const r = parseFloat(note.dataset.r)

        if(Math.abs(r-radius) < 40){
            score += 100
            scoreText.textContent="Score:"+score
            note.remove()
            notes.splice(index,1)
        }
    })
})

setInterval(spawnNote,550)
setInterval(update,16)

</script>

</body>
</html>
