<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SIF Style - Combo Cut-in</title>
    <style>
        body { background: #222; color: white; text-align: center; font-family: 'Helvetica', sans-serif; overflow: hidden; margin: 0; }
        #game-container { position: relative; width: 600px; height: 500px; margin: 20px auto; border: 4px solid #ff69b4; background: radial-gradient(circle, #444, #000); border-radius: 20px; overflow: hidden; }
        
        /* ターゲットとノーツ */
        .target { position: absolute; width: 65px; height: 65px; border: 3px solid rgba(255,105,180,0.6); border-radius: 50%; transform: translate(-50%, -50%); color: #ff69b4; font-weight: bold; }
        .note { position: absolute; width: 40px; height: 40px; background: radial-gradient(circle, #fff, #ff69b4); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px #ff69b4; }

        /* スコア・コンボ表示 */
        #ui-layer { position: absolute; width: 100%; top: 10px; pointer-events: none; }
        #score { font-size: 28px; color: #fff; text-shadow: 2px 2px 4px #000; }
        #combo-display { font-size: 40px; color: #ffeb3b; font-style: italic; text-shadow: 2px 2px 0 #f57f17; margin-top: 150px; opacity: 0; transition: opacity 0.2s; }

        /* ★カットイン演出 */
        #cutin {
            position: absolute; bottom: -100%; right: -100%; width: 250px; height: 350px;
            background: linear-gradient(45deg, #ff69b4, #ffc0cb);
            border-radius: 20px; border: 5px solid white;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: white; font-weight: bold;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10; box-shadow: -10px -10px 20px rgba(0,0,0,0.5);
        }
        #cutin.active { bottom: 10px; right: 10px; }
        #multiplier-badge { background: #ffeb3b; color: #000; padding: 2px 10px; border-radius: 10px; font-size: 18px; display: none; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="score">SCORE: 0 <span id="multiplier-badge">Bonus x1.5!</span></div>
    </div>

    <div id="game-container">
        <div id="combo-display">0 COMBO</div>
        <!-- カットイン要素（画像URLがあれば background-image に設定可能） -->
        <div id="cutin">Nice Combo!<br>Bonus Time!</div>
    </div>

    <p>キー: A, S, D, F, Space, J, K, L, ;</p>

<script>
const container = document.getElementById('game-container');
const scoreEl = document.getElementById('score');
const comboEl = document.getElementById('combo-display');
const cutinEl = document.getElementById('cutin');
const badgeEl = document.getElementById('multiplier-badge');

let score = 0;
let combo = 0;
let multiplier = 1.0;
let notes = [];

const keys = ['A', 'S', 'D', 'F', ' ', 'J', 'K', 'L', ';'];
const centerX = 300, centerY = 80, radius = 320;
const targets = [];

// ターゲット初期化
keys.forEach((key, i) => {
    const angle = Math.PI * (1.1 - (i * 0.15));
    const tx = centerX + Math.cos(angle) * radius;
    const ty = centerY + Math.sin(angle) * radius;
    const div = document.createElement('div');
    div.className = 'target';
    div.style.left = tx + 'px';
    div.style.top = ty + 'px';
    div.innerText = (key === ' ') ? 'SPC' : key;
    container.appendChild(div);
    targets.push({ x: tx, y: ty, key: key.toUpperCase() });
});

// カットイン演出を実行する関数
function triggerCutIn() {
    multiplier = 1.5; // スコア上昇率アップ
    badgeEl.style.display = 'inline';
    cutinEl.classList.add('active');
    
    // 2秒後に戻す
    setTimeout(() => {
        cutinEl.classList.remove('active');
        multiplier = 1.0;
        badgeEl.style.display = 'none';
    }, 2000);
}

function spawnNote() {
    const targetIdx = Math.floor(Math.random() * 9);
    const target = targets[targetIdx];
    const noteDiv = document.createElement('div');
    noteDiv.className = 'note';
    container.appendChild(noteDiv);
    notes.push({ el: noteDiv, targetIdx, progress: 0, speed: 0.012 });
}

function update() {
    notes.forEach((note, index) => {
        note.progress += note.speed;
        const target = targets[note.targetIdx];
        note.el.style.left = (centerX + (target.x - centerX) * note.progress) + 'px';
        note.el.style.top = (centerY + (target.y - centerY) * note.progress) + 'px';
        note.el.style.transform = `translate(-50%, -50%) scale(${0.5 + note.progress})`;

        if (note.progress >= 1.1) {
            note.el.remove();
            notes.splice(index, 1);
            combo = 0;
            comboEl.style.opacity = 0;
        }
    });
    requestAnimationFrame(update);
}

window.addEventListener('keydown', (e) => {
    const pressedKey = e.key.toUpperCase() === ' ' ? ' ' : e.key.toUpperCase();
    const hitIdx = notes.findIndex(n => targets[n.targetIdx].key === pressedKey && n.progress > 0.85 && n.progress < 1.1);
    
    if (hitIdx !== -1) {
        const note = notes[hitIdx];
        // スコア加算（コンボ数と倍率を考慮）
        score += Math.floor(100 * multiplier * (1 + combo * 0.01));
        combo++;
        
        // 10コンボごとにカットイン
        if (combo > 0 && combo % 10 === 0) {
            triggerCutIn();
        }

        scoreEl.innerHTML = `SCORE: ${score} <span id="multiplier-badge" style="display:${multiplier > 1 ? 'inline':'none'}">Bonus x1.5!</span>`;
        comboEl.innerText = `${combo} COMBO`;
        comboEl.style.opacity = 1;
        
        note.el.remove();
        notes.splice(hitIdx, 1);
    }
});

setInterval(spawnNote, 700);
update();
</script>
</body>
</html>
