<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Radial Rhythm Game</title>

<style>
body{
    background:#000;
    color:white;
    text-align:center;
    font-family:sans-serif;
}

#game{
    position:relative;
    width:500px;
    height:700px;
    margin:auto;
    background:radial-gradient(circle at center 120%, #222, #000);
    overflow:hidden;
    border:3px solid white;
}

.note{
    position:absolute;
    width:26px;
    height:26px;
    background:#ffe066;
    border-radius:50%;
    box-shadow:0 0 10px #fff;
}

.target{
    position:absolute;
    width:70px;
    height:70px;
    border-radius:50%;
    border:4px solid #4de1ff;
}

#score{
    font-size:24px;
    margin:10px;
}
</style>
</head>

<body>

<h1>🎵 Radial Rhythm 🎵</h1>
<p>キー：A S D F G H J K L</p>
<div id="score">Score:0</div>

<div id="game"></div>

<script>
const game = document.getElementById("game")
const scoreText = document.getElementById("score")

const centerX = 250
const centerY = 120   // 音符位置（発射点）

const radius = 260    // 判定円の半径
const lanes = 9

let notes=[]
let score=0

// 判定サークル生成
let laneAngles=[]

for(let i=0;i<lanes;i++){

    const angle = (-80 + i*20) * Math.PI/180
    laneAngles.push(angle)

    const x = centerX + Math.cos(angle)*radius
    const y = centerY + Math.sin(angle)*radius

    const t = document.createElement("div")
    t.className="target"
    t.style.left = (x-35)+"px"
    t.style.top  = (y-35)+"px"

    game.appendChild(t)
}

// ノーツ生成
function spawnNote(){

    const lane = Math.floor(Math.random()*lanes)

    const note = document.createElement("div")
    note.className="note"

    note.dataset.lane = lane
    note.dataset.r = 0

    game.appendChild(note)
    notes.push(note)
}

// 更新
function update(){

    notes.forEach((note,index)=>{

        let r = parseFloat(note.dataset.r)
        r += 4
        note.dataset.r = r

        const angle = laneAngles[note.dataset.lane]

        const x = centerX + Math.cos(angle)*r
        const y = centerY + Math.sin(angle)*r

        note.style.left = (x-13)+"px"
        note.style.top  = (y-13)+"px"

        // 判定範囲
        if(r > radius+40){
            note.remove()
            notes.splice(index,1)
        }
    })
}

// 判定
const keys = ["a","s","d","f","g","h","j","k","l"]

document.addEventListener("keydown",(e)=>{

    const lane = keys.indexOf(e.key)
    if(lane===-1) return

    notes.forEach((note,index)=>{

        if(parseInt(note.dataset.lane)!==lane) return

        const r = parseFloat(note.dataset.r)

        if(Math.abs(r-radius) < 25){
            score += 100
            scoreText.textContent="Score:"+score
            note.remove()
            notes.splice(index,1)
        }
    })
})

setInterval(spawnNote,600)
setInterval(update,16)

</script>

</body>
</html>
